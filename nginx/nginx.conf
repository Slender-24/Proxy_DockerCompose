worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Configuración de la caché: path, keys zone (10m), límite de caché de 500m
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=mi_cache:10m max_size=500m inactive=60m use_temp_path=off;

    # Balanceo de carga (por defecto es Round Robin)
    upstream backend_apaches {
        server apache1:80;
        server apache2:80;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://backend_apaches;
            
            # Encabezados para transferir la IP original al backend si se requiere
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Habilitar caché
            proxy_cache mi_cache;
            proxy_cache_valid 200 302 10m;
            proxy_cache_valid 404 1m;
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
}
