services:
  apache1:
    image: httpd:latest
    container_name: apache1
    volumes:
      - ./html:/usr/local/apache2/htdocs
    expose:
      - "80"
    restart: always

  apache2:
    image: httpd:latest
    container_name: apache2
    volumes:
      - ./html:/usr/local/apache2/htdocs
    expose:
      - "80"
    restart: always

  nginx-proxy:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - apache1
      - apache2
    restart: always

volumes:
  nginx-cache:
